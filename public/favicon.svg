<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="petal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66CCFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088CC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hoa Đào (Blue/Yellow Theme) -->
  <g transform="translate(24, 24)">
    <!-- Petal 1 -->
    <path d="M0,0 Q-10,-20 0,-22 Q10,-20 0,0" fill="url(#petal-grad)" transform="rotate(0)" />
    <!-- Petal 2 -->
    <path d="M0,0 Q-10,-20 0,-22 Q10,-20 0,0" fill="url(#petal-grad)" transform="rotate(72)" />
    <!-- Petal 3 -->
    <path d="M0,0 Q-10,-20 0,-22 Q10,-20 0,0" fill="url(#petal-grad)" transform="rotate(144)" />
    <!-- Petal 4 -->
    <path d="M0,0 Q-10,-20 0,-22 Q10,-20 0,0" fill="url(#petal-grad)" transform="rotate(216)" />
    <!-- Petal 5 -->
    <path d="M0,0 Q-10,-20 0,-22 Q10,-20 0,0" fill="url(#petal-grad)" transform="rotate(288)" />
    
    <!-- Nhụy hoa (Vàng rực rỡ) -->
    <circle cx="0" cy="0" r="4" fill="#FFE500" />
    <circle cx="0" cy="0" r="2" fill="#FFD700" />
  </g>
</svg>